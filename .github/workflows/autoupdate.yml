name: Autoupdate

on:
  schedule:
    # Run daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  autoupdate:
    name: Check for Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Update registry-index submodule
        run: |
          git -C registry-index fetch origin main
          git -C registry-index checkout -B main origin/main

      - name: Run tag-only autoupdate
        run: deno run -RW --allow-net --allow-env --allow-run=gh src/scripts/autoupdate.ts registry-index/manifests --tag-only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate index files
        run: deno task generate

      - name: Check for changes
        id: check
        run: |
          if [ -z "$(git -C registry-index status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit registry-index updates
        if: steps.check.outputs.changed == 'true'
        env:
          REGISTRY_INDEX_TOKEN: ${{ secrets.REGISTRY_INDEX_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git -C registry-index remote set-url origin \
            https://x-access-token:${REGISTRY_INDEX_TOKEN}@github.com/cataclysmbn/registry-index.git
          git -C registry-index add -A
          git -C registry-index -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "chore: autoupdate mod versions"
          git -C registry-index push origin HEAD:main
